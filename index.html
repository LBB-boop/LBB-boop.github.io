<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冰冰专属天气预报</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: #fff;
    overflow-x: hidden;
    position: relative;
  }

  /* 华晨宇造型背景轮播 */
  .bg-slideshow {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -2;
    overflow: hidden;
  }
  .bg-slideshow .bg-slide {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-size: cover;
    background-position: center top;
    background-repeat: no-repeat;
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
    animation: bgKenBurns 20s ease-in-out infinite alternate;
  }
  .bg-slideshow .bg-slide.active {
    opacity: 1;
  }
  @keyframes bgKenBurns {
    0% { transform: scale(1.0); }
    100% { transform: scale(1.06); }
  }
  .bg-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -1;
    background: linear-gradient(180deg, rgba(15,12,41,0.55) 0%, rgba(48,43,99,0.50) 40%, rgba(36,36,62,0.60) 100%);
    backdrop-filter: blur(2px);
  }
  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }

  /* 顶部 */
  .header {
    text-align: center;
    padding: 20px 0 10px;
  }
  .header h1 {
    font-size: 24px;
    font-weight: 700;
    background: linear-gradient(90deg, #ffd700, #ff6b9d, #a8edea, #fed6e3);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
    animation: headerShimmer 4s ease-in-out infinite;
    text-shadow: none;
  }
  @keyframes headerShimmer {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .header .subtitle {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    margin-top: 4px;
  }

  /* 城市选择 */
  .city-bar {
    display: flex;
    gap: 8px;
    margin: 16px 0;
  }
  .city-bar input {
    flex: 1;
    padding: 10px 16px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 15px;
    outline: none;
    transition: border-color 0.3s;
  }
  .city-bar input::placeholder { color: rgba(255,255,255,0.35); }
  .city-bar input:focus { border-color: #fed6e3; }
  .city-bar button {
    padding: 10px 20px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #a8edea, #fed6e3);
    color: #333;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s;
    white-space: nowrap;
  }
  .city-bar button:active { transform: scale(0.95); }

  /* 定位按钮 */
  .locate-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin: 0 auto 16px;
    padding: 8px 18px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .locate-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }

  /* 加载 */
  .loading {
    text-align: center;
    padding: 60px 0;
    font-size: 16px;
    color: rgba(255,255,255,0.5);
  }
  .loading .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #fed6e3;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 卡片通用 */
  .card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 16px;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  .card .card-title {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* 出门指数卡 */
  .index-card { text-align: center; }
  .index-row {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
  }
  .index-col {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border-radius: 16px;
    padding: 16px 8px;
  }
  .index-col .col-label {
    font-size: 12px;
    color: rgba(255,255,255,0.45);
    margin-bottom: 8px;
  }
  .index-score {
    font-size: 48px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 2px;
  }
  .index-label {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .index-desc {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
  }
  .index-bars {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 12px;
  }
  .index-bar-item {
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 10px 6px;
    text-align: center;
  }
  .index-bar-item .bar-icon { font-size: 22px; margin-bottom: 4px; }
  .index-bar-item .bar-label { font-size: 11px; color: rgba(255,255,255,0.45); margin-bottom: 6px; }
  .index-bar-item .bar-track {
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
    margin: 0 4px;
  }
  .index-bar-item .bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.8s ease;
  }
  .index-bar-item .bar-val { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 4px; }

  /* 今日+明日天气双卡 */
  .weather-today-tomorrow {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
  }
  .wt-card {
    flex: 1;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 18px;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  .wt-card .wt-date {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 10px;
  }
  .wt-card .wt-date .wt-tag {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 8px;
    font-size: 11px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .wt-card .wt-tag.today { background: rgba(168,237,234,0.2); color: #a8edea; }
  .wt-card .wt-tag.tomorrow { background: rgba(254,214,227,0.2); color: #fed6e3; }
  .wt-main {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .wt-icon { font-size: 40px; line-height: 1; }
  .wt-temp { flex: 1; }
  .wt-temp .temp-range {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -1px;
  }
  .wt-temp .temp-range .unit { font-size: 14px; font-weight: 400; }
  .wt-temp .weather-desc {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    margin-top: 1px;
  }
  .wt-temp .feels-like {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    margin-top: 1px;
  }
  .wt-details {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
  }
  .wt-detail-item {
    text-align: center;
    padding: 6px 2px;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
  }
  .wt-detail-item .dd-icon { font-size: 14px; }
  .wt-detail-item .dd-val { font-size: 12px; font-weight: 600; }
  .wt-detail-item .dd-label { font-size: 9px; color: rgba(255,255,255,0.4); }

  /* 未来15天折叠 */
  .forecast-collapse-btn {
    width: 100%;
    padding: 12px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.5);
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .forecast-collapse-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .forecast-collapse-btn .arrow {
    transition: transform 0.3s;
    display: inline-block;
  }
  .forecast-collapse-btn.expanded .arrow { transform: rotate(180deg); }

  .forecast-list {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.5s ease;
    margin-bottom: 0;
  }
  .forecast-list.show {
    max-height: 3000px;
    margin-bottom: 16px;
  }
  .forecast-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: rgba(255,255,255,0.06);
    border-radius: 12px;
    margin-bottom: 6px;
  }
  .forecast-item .fc-date {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    width: 60px;
    flex-shrink: 0;
  }
  .forecast-item .fc-icon { font-size: 22px; width: 28px; text-align: center; }
  .forecast-item .fc-desc { font-size: 13px; flex: 1; color: rgba(255,255,255,0.7); }
  .forecast-item .fc-temp { font-size: 14px; font-weight: 600; white-space: nowrap; }
  .forecast-item .fc-temp .fc-lo { color: rgba(255,255,255,0.45); }

  /* 出门提醒 */
  .tips-card .card-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tip-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    animation: fadeInUp 0.5s ease both;
  }
  .tip-item:last-child { border-bottom: none; }
  .tip-item:nth-child(2) { animation-delay: 0.05s; }
  .tip-item:nth-child(3) { animation-delay: 0.1s; }
  .tip-item:nth-child(4) { animation-delay: 0.15s; }
  .tip-item:nth-child(5) { animation-delay: 0.2s; }
  .tip-item:nth-child(6) { animation-delay: 0.25s; }
  .tip-item:nth-child(7) { animation-delay: 0.3s; }
  .tip-item:nth-child(8) { animation-delay: 0.35s; }
  .tip-item:nth-child(9) { animation-delay: 0.4s; }
  .tip-item:nth-child(10) { animation-delay: 0.45s; }
  .tip-item:nth-child(11) { animation-delay: 0.5s; }
  .tip-item:nth-child(12) { animation-delay: 0.55s; }
  .tip-item:nth-child(13) { animation-delay: 0.6s; }
  .tip-item:nth-child(14) { animation-delay: 0.65s; }
  .tip-item:nth-child(15) { animation-delay: 0.7s; }
  .tip-item:nth-child(16) { animation-delay: 0.75s; }
  .tip-item:nth-child(17) { animation-delay: 0.8s; }
  .tip-item:nth-child(18) { animation-delay: 0.85s; }
  .tip-item:nth-child(19) { animation-delay: 0.9s; }
  .tip-item:nth-child(20) { animation-delay: 0.95s; }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .tip-icon {
    font-size: 28px;
    flex-shrink: 0;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    background: rgba(255,255,255,0.06);
  }
  .tip-content { flex: 1; }
  .tip-content .tip-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 3px;
  }
  .tip-content .tip-desc {
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    line-height: 1.5;
  }
  .tip-item.important .tip-icon { background: rgba(255,78,80,0.2); }
  .tip-item.important .tip-title { color: #ff6b6b; }

  .section-title {
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    letter-spacing: 2px;
    padding: 8px 0 4px;
    margin-top: 4px;
    border-bottom: none !important;
    animation: none !important;
  }
  .section-title .section-line {
    display: inline-block;
    width: 24px;
    height: 2px;
    background: rgba(255,255,255,0.2);
    vertical-align: middle;
    margin-right: 8px;
    border-radius: 1px;
  }

  .footer {
    text-align: center;
    padding: 20px 0;
    font-size: 12px;
    color: rgba(255,255,255,0.25);
  }

  .error-card {
    background: rgba(255,78,80,0.1);
    border: 1px solid rgba(255,78,80,0.3);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    color: rgba(255,255,255,0.7);
    margin: 20px 0;
  }
  .error-card .err-icon { font-size: 40px; margin-bottom: 8px; }
</style>
</head>
<body>
<!-- 华晨宇2025十佳造型背景轮播 -->
<div class="bg-slideshow" id="bgSlideshow">
  <div class="bg-slide" style="background-image:url('images/hcy_1.jpg')"></div>
  <div class="bg-slide" style="background-image:url('images/hcy_2.jpg')"></div>
  <div class="bg-slide" style="background-image:url('images/hcy_3.jpg')"></div>
  <div class="bg-slide" style="background-image:url('images/hcy_4.jpg')"></div>
  <div class="bg-slide" style="background-image:url('images/hcy_5.jpg')"></div>
  <div class="bg-slide" style="background-image:url('images/hcy_6.jpg')"></div>
  <div class="bg-slide" style="background-image:url('images/hcy_7.jpg')"></div>
  <div class="bg-slide" style="background-image:url('images/hcy_8.jpg')"></div>
  <div class="bg-slide" style="background-image:url('images/hcy_9.jpg')"></div>
</div>
<div class="bg-overlay"></div>

<div class="container">
  <div class="header">
    <h1>❄️ 冰冰专属天气预报</h1>
    <div class="subtitle">出门前，先看看这些</div>
  </div>

  <div class="locate-btn" onclick="locateMe()">📍 自动定位当前位置</div>

  <div class="city-bar">
    <input id="cityInput" type="text" placeholder="输入城市名，如：武汉" value="应城" onkeydown="if(event.key==='Enter')searchCity()">
    <button onclick="searchCity()">查询</button>
  </div>

  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      正在获取天气数据...
    </div>
  </div>

  <div class="footer">数据来源：Open-Meteo · 仅供参考</div>
</div>

<script>
const WMO_CODES = {
  0:{desc:'晴',icon:'☀️'},1:{desc:'大部晴朗',icon:'🌤️'},2:{desc:'多云',icon:'⛅'},3:{desc:'阴天',icon:'☁️'},
  45:{desc:'雾',icon:'🌫️'},48:{desc:'冻雾',icon:'🌫️'},
  51:{desc:'小毛毛雨',icon:'🌦️'},53:{desc:'中毛毛雨',icon:'🌦️'},55:{desc:'大毛毛雨',icon:'🌧️'},
  56:{desc:'冻毛毛雨',icon:'🌧️'},57:{desc:'强冻毛毛雨',icon:'🌧️'},
  61:{desc:'小雨',icon:'🌧️'},63:{desc:'中雨',icon:'🌧️'},65:{desc:'大雨',icon:'🌧️'},
  66:{desc:'冻雨',icon:'🧊'},67:{desc:'强冻雨',icon:'🧊'},
  71:{desc:'小雪',icon:'🌨️'},73:{desc:'中雪',icon:'❄️'},75:{desc:'大雪',icon:'❄️'},77:{desc:'雪粒',icon:'🌨️'},
  80:{desc:'小阵雨',icon:'🌦️'},81:{desc:'中阵雨',icon:'🌧️'},82:{desc:'强阵雨',icon:'⛈️'},
  85:{desc:'小阵雪',icon:'🌨️'},86:{desc:'大阵雪',icon:'❄️'},
  95:{desc:'雷暴',icon:'⛈️'},96:{desc:'雷暴伴冰雹',icon:'⛈️'},99:{desc:'强雷暴伴冰雹',icon:'⛈️'},
};
function getWMO(code){return WMO_CODES[code]||{desc:'未知',icon:'❓'};}
function windLevel(s){if(s<6)return'微风';if(s<12)return'轻风';if(s<20)return'和风';if(s<29)return'劲风';if(s<39)return'强风';return'大风';}
function uvLevel(i){if(i<=2)return'弱';if(i<=5)return'中等';if(i<=7)return'强';if(i<=10)return'很强';return'极强';}
function barColor(s){if(s>=70)return'#4caf50';if(s>=50)return'#ffc107';return'#ff5722';}

function calcOutIndex(data){
  let score=80;
  const{tempMin,tempMax,weatherCode,precipProb,windMax,uvMax,humidity}=data;
  const isRain=[51,53,55,56,57,61,63,65,66,67,80,81,82,95,96,99].includes(weatherCode);
  const isSnow=[71,73,75,77,85,86].includes(weatherCode);
  const isFog=[45,48].includes(weatherCode);
  const isThunder=[95,96,99].includes(weatherCode);
  if(isThunder)score-=30;else if(isRain)score-=precipProb*0.2;
  if(isSnow)score-=15;if(isFog)score-=10;
  if(tempMax>=38)score-=15;else if(tempMax>=35)score-=8;else if(tempMax>=30)score-=3;
  if(tempMin<=-5)score-=15;else if(tempMin<=0)score-=8;else if(tempMin<=5)score-=3;
  if(windMax>=50)score-=15;else if(windMax>=39)score-=8;else if(windMax>=25)score-=3;
  if(uvMax>9)score-=5;else if(uvMax>7)score-=2;
  if(humidity>=90)score-=5;else if(humidity<=20)score-=3;
  const diff=tempMax-tempMin;if(diff>=18)score-=5;else if(diff>=12)score-=2;
  score=Math.max(0,Math.min(100,Math.round(score)));
  let label,color,desc;
  if(score>=85){label='非常适宜';color='#4caf50';desc='天气很棒，放心出门！';}
  else if(score>=70){label='适宜出门';color='#8bc34a';desc='天气不错，正常出行。';}
  else if(score>=55){label='一般';color='#ffc107';desc='有小状况，注意提醒事项。';}
  else if(score>=40){label='不太适宜';color='#ff9800';desc='条件较差，做好防护。';}
  else{label='不建议出门';color='#f44336';desc='天气恶劣，非必要不出门！';}
  return{score,label,color,desc};
}

function calcSubIndex(data){
  const{tempMin,tempMax,weatherCode,precipProb,windMax,uvMax,humidity}=data;
  const isRain=[51,53,55,56,57,61,63,65,66,67,80,81,82,95,96,99].includes(weatherCode);
  const isSnow=[71,73,75,77,85,86].includes(weatherCode);
  let dress=80;
  if(tempMax>=35)dress=30;else if(tempMax>=30)dress=50;else if(tempMax>=22)dress=90;
  else if(tempMax>=15)dress=70;else if(tempMax>=5)dress=50;else dress=30;
  if(tempMax-tempMin>=15)dress-=15;
  let sport=80;
  if(isRain||isSnow)sport-=30;if(precipProb>50)sport-=15;
  if(tempMax>=35||tempMin<=-5)sport-=25;else if(tempMax>=30||tempMin<=0)sport-=10;
  if(windMax>=30)sport-=15;else if(windMax>=20)sport-=5;if(uvMax>8)sport-=10;
  let dry=80;
  if(isRain)dry=20;else if(isSnow)dry=25;
  if(precipProb>60)dry-=30;else if(precipProb>30)dry-=15;
  if(humidity>=80)dry-=20;else if(humidity>=65)dry-=10;
  if(weatherCode<=1)dry+=10;
  return{
    dress:{score:Math.max(0,Math.min(100,dress)),label:'穿衣'},
    sport:{score:Math.max(0,Math.min(100,sport)),label:'运动'},
    dry:{score:Math.max(0,Math.min(100,dry)),label:'晾晒'},
  };
}

function makeDayData(d,i){
  return{
    tempMax:Math.round(d.daily.temperature_2m_max[i]),
    tempMin:Math.round(d.daily.temperature_2m_min[i]),
    weatherCode:d.daily.weathercode[i],
    precipProb:d.daily.precipitation_probability_max[i]??0,
    precipSum:Math.round((d.daily.precipitation_sum[i]??0)*10)/10,
    windMax:Math.round(d.daily.wind_speed_10m_max[i]),
    uvMax:Math.round((d.daily.uv_index_max[i]??0)*10)/10,
    humidity:d.daily.relative_humidity_2m_max[i]??50,
    feelsMax:d.daily.apparent_temperature_max?Math.round(d.daily.apparent_temperature_max[i]):null,
    feelsMin:d.daily.apparent_temperature_min?Math.round(d.daily.apparent_temperature_min[i]):null,
    sunrise:d.daily.sunrise[i]?d.daily.sunrise[i].split('T')[1]:null,
    sunset:d.daily.sunset[i]?d.daily.sunset[i].split('T')[1]:null,
  };
}

  if(tempMax>=30)items.push('💧 水杯');if(tempMin<=5)items.push('🧤 手套');
  if(tempMin<=0)items.push('🧣 围巾');if(isFog)items.push('😷 口罩');
  if(humidity<=35)items.push('🧴 护手霜');if(windMax>=25)items.push('📎 固定夹');
  if(isRain&&precipProb>=50)items.push('📱 防水袋');
  if(month>=6&&month<=8)items.push('🦟 驱蚊液');if(month>=3&&month<=5)items.push('🤧 抗过敏药');
  items.push('🔑 钥匙');items.push('📱 手机');
  if(items.length>0){tips.push({icon:'🎒',title:'明天出门别忘了',desc:items.join('  ')});}

  return tips;
}

function fmtDate(offset){
  const d=new Date();d.setDate(d.getDate()+offset);
  return d.toLocaleDateString('zh-CN',{month:'numeric',day:'numeric',weekday:'short'});
}
function fmtDateLong(offset){
  const d=new Date();d.setDate(d.getDate()+offset);
  return d.toLocaleDateString('zh-CN',{month:'long',day:'numeric',weekday:'long'});
}

        <div class="wt-detail-item"><div class="dd-icon">☀️</div><div class="dd-val">${todayData.uvMax}</div><div class="dd-label">UV</div></div>
        <div class="wt-detail-item"><div class="dd-icon">💧</div><div class="dd-val">${todayData.humidity}%</div><div class="dd-label">湿度</div></div>
      </div>
    </div>
    <div class="wt-card">
      <div class="wt-date">${fmtDate(1)} <span class="wt-tag tomorrow">明天</span></div>
      <div class="wt-main">
        <div class="wt-icon">${tomorrowWmo.icon}</div>
        <div class="wt-temp">
          <div class="temp-range">${tomorrowData.tempMin}<span class="unit">°</span> / ${tomorrowData.tempMax}<span class="unit">°C</span></div>
          <div class="weather-desc">${tomorrowWmo.desc}</div>
          ${tomorrowData.feelsMax!==null?`<div class="feels-like">体感 ${tomorrowData.feelsMin}°~${tomorrowData.feelsMax}°C</div>`:''}
        </div>
      </div>
      <div class="wt-details">
        <div class="wt-detail-item"><div class="dd-icon">🌧️</div><div class="dd-val">${tomorrowData.precipProb}%</div><div class="dd-label">降雨</div></div>
        <div class="wt-detail-item"><div class="dd-icon">💨</div><div class="dd-val">${tomorrowData.windMax}</div><div class="dd-label">${windLevel(tomorrowData.windMax)}</div></div>
        <div class="wt-detail-item"><div class="dd-icon">☀️</div><div class="dd-val">${tomorrowData.uvMax}</div><div class="dd-label">UV</div></div>
        <div class="wt-detail-item"><div class="dd-icon">💧</div><div class="dd-val">${tomorrowData.humidity}%</div><div class="dd-label">湿度</div></div>
      </div>
    </div>
  </div>`;

  // 未来15天折叠
  if(forecastData&&forecastData.length>0){
    html+=`
    <button class="forecast-collapse-btn" onclick="toggleForecast(this)">
      📅 未来 ${forecastData.length} 天天气预报 <span class="arrow">▼</span>
    </button>
    <div class="forecast-list" id="forecastList">
      ${forecastData.map(fd=>{
        const fw=getWMO(fd.weatherCode);
        return`<div class="forecast-item">
          <div class="fc-date">${fd.dateShort}</div>
          <div class="fc-icon">${fw.icon}</div>
          <div class="fc-desc">${fw.desc}</div>
          <div class="fc-temp"><span class="fc-lo">${fd.tempMin}°</span> / ${fd.tempMax}°C</div>
        </div>`;
      }).join('')}
    </div>`;
  }

  // 出门提醒
  html+=`
  <div class="card tips-card">
    <div class="card-title">🔔 明天出门提醒${importantCount>0?` <span style="font-size:12px;color:#ff6b6b;font-weight:400;">· ${importantCount}条重要提醒</span>`:''}</div>
    ${tips.map(t=>{
      if(t.type==='section')return`<div class="section-title"><span class="section-line"></span>${t.title}</div>`;
      return`
      <div class="tip-item${t.important?' important':''}">
        <div class="tip-icon">${t.icon}</div>
        <div class="tip-content">
          <div class="tip-title">${t.title}</div>
          <div class="tip-desc">${t.desc}</div>
        </div>
      </div>`;
    }).join('')}
  </div>`;

  document.getElementById('content').innerHTML=html;
}

function toggleForecast(btn){
  btn.classList.toggle('expanded');
  const list=document.getElementById('forecastList');
  list.classList.toggle('show');
  btn.querySelector('.arrow').style.transform=btn.classList.contains('expanded')?'rotate(180deg)':'';
}

function renderError(msg){
  document.getElementById('content').innerHTML=`<div class="error-card"><div class="err-icon">😕</div><div>${msg}</div></div>`;
}

async function fetchWeather(lat,lon,cityName){
  document.getElementById('content').innerHTML='<div class="loading"><div class="spinner"></div>正在获取天气数据...</div>';
  try{
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode,wind_speed_10m_max,uv_index_max,sunrise,sunset,relative_humidity_2m_max,apparent_temperature_max,apparent_temperature_min,precipitation_sum&timezone=auto&forecast_days=16`;
    const res=await fetch(url);
    if(!res.ok)throw new Error('天气API请求失败');
    const d=await res.json();

    const todayData=makeDayData(d,0);
    const tomorrowData=makeDayData(d,1);

    // 未来15天（从后天开始）
    const forecastData=[];
    for(let i=2;i<d.daily.temperature_2m_max.length;i++){
      const dd=new Date(d.daily.time[i]);
      forecastData.push({
        dateShort:dd.toLocaleDateString('zh-CN',{month:'numeric',day:'numeric',weekday:'short'}),
        tempMax:Math.round(d.daily.temperature_2m_max[i]),
        tempMin:Math.round(d.daily.temperature_2m_min[i]),
        weatherCode:d.daily.weathercode[i],
      });
    }

    renderAll(todayData,tomorrowData,forecastData,cityName);
  }catch(e){
    console.error(e);
    renderError('获取天气数据失败，请检查网络后重试');
  }
}

async function searchCity(){
  const city=document.getElementById('cityInput').value.trim();
  if(!city)return;
  document.getElementById('content').innerHTML='<div class="loading"><div class="spinner"></div>正在搜索城市...</div>';
  try{
    const geoUrl=`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=zh`;
    const geoRes=await fetch(geoUrl);
    const geoData=await geoRes.json();
    if(!geoData.results||geoData.results.length===0){renderError(`未找到城市「${city}」，请检查名称后重试`);return;}
    const r=geoData.results[0];
    const name=r.name+(r.admin1?` · ${r.admin1}`:'');
    await fetchWeather(r.latitude,r.longitude,name);
  }catch(e){renderError('城市搜索失败，请检查网络后重试');}
}

function locateMe(){
  if(!navigator.geolocation){renderError('您的浏览器不支持定位功能');return;}
  document.getElementById('content').innerHTML='<div class="loading"><div class="spinner"></div>正在定位...</div>';
  navigator.geolocation.getCurrentPosition(
    async(pos)=>{await fetchWeather(pos.coords.latitude,pos.coords.longitude,'当前位置');},
    ()=>{renderError('定位失败，请手动输入城市名查询');},
    {timeout:8000}
  );
}

searchCity();

// 华晨宇造型背景轮播
(function(){
  const slides = document.querySelectorAll('.bg-slide');
  if(!slides.length) return;
  let current = 0;
  slides[0].classList.add('active');
  setInterval(()=>{
    slides[current].classList.remove('active');
    current = (current + 1) % slides.length;
    slides[current].classList.add('active');
  }, 6000);
})();
</script>
