<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冰冰专属天气预报</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: #fff;
    overflow-x: hidden;
    position: relative;
  }

  /* 华晨宇造型背景轮播 */
  .bg-slideshow {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -2;
    overflow: hidden;
  }
  .bg-slideshow .bg-slide {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-size: cover;
    background-position: center top;
    background-repeat: no-repeat;
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
    animation: bgKenBurns 20s ease-in-out infinite alternate;
  }
  .bg-slideshow .bg-slide.active {
    opacity: 1;
  }
  @keyframes bgKenBurns {
    0% { transform: scale(1.0); }
    100% { transform: scale(1.06); }
  }
  .bg-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -1;
    background: linear-gradient(180deg, rgba(30,5,5,0.55) 0%, rgba(60,10,20,0.50) 40%, rgba(20,5,15,0.65) 100%);
    backdrop-filter: blur(2px);
  }
  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }

  /* 顶部 */
  .header {
    text-align: center;
    padding: 20px 0 10px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    background: linear-gradient(90deg, #ff4444, #ff8a80, #ffd700, #ff4444);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
    animation: headerShimmer 4s ease-in-out infinite;
    text-shadow: none;
  }
  @keyframes headerShimmer {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .header .subtitle {
    font-size: 13px;
    color: rgba(255,200,200,0.6);
    margin-top: 4px;
    font-style: italic;
  }
  /* 火星Logo */
  .mars-logo {
    font-size: 11px;
    color: rgba(255,80,80,0.4);
    letter-spacing: 4px;
    margin-top: 6px;
    text-transform: uppercase;
  }

  /* 城市搜索栏（整合定位+输入+查询） */
  .city-search-bar {
    display: flex;
    gap: 6px;
    margin: 16px 0 10px;
    align-items: center;
  }
  .city-search-bar .locate-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px 12px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.6);
    font-size: 18px;
    cursor: pointer;
    transition: all 0.3s;
    flex-shrink: 0;
  }
  .city-search-bar .locate-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
  .city-search-bar input {
    flex: 1;
    padding: 10px 16px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 15px;
    outline: none;
    transition: border-color 0.3s;
  }
  .city-search-bar input::placeholder { color: rgba(255,255,255,0.35); }
  .city-search-bar input:focus { border-color: #fed6e3; }
  .city-search-bar .search-btn {
    padding: 10px 16px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #ff4444, #ff8a80);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
    text-shadow: 0 1px 2px rgba(0,0,0,0.2);
  }
  .city-search-bar .search-btn:active { transform: scale(0.95); }

  /* 城市标签列表 */
  .city-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
  }
  .city-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.3s;
    backdrop-filter: blur(10px);
  }
  .city-tag:hover { background: rgba(255,255,255,0.12); color: #fff; }
  .city-tag.active {
    background: linear-gradient(135deg, rgba(255,68,68,0.3), rgba(255,138,128,0.25));
    border-color: rgba(255,68,68,0.5);
    color: #fff;
    font-weight: 600;
  }
  .city-tag .tag-close {
    font-size: 14px;
    opacity: 0.5;
    margin-left: 2px;
    transition: opacity 0.2s;
  }
  .city-tag .tag-close:hover { opacity: 1; }

  /* 加载 - 黑煤球 */
  .loading {
    text-align: center;
    padding: 60px 0;
    font-size: 16px;
    color: rgba(255,200,200,0.6);
  }
  .coal-ball {
    position: relative;
    width: 64px; height: 72px;
    margin: 0 auto 20px;
    animation: coalBounce 1.2s ease-in-out infinite;
  }
  .coal-body {
    width: 56px; height: 56px;
    background: radial-gradient(circle at 40% 35%, #444, #1a1a1a 60%, #0d0d0d);
    border-radius: 50%;
    margin: 16px auto 0;
    position: relative;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5), inset 0 -4px 8px rgba(0,0,0,0.4), inset 0 4px 8px rgba(100,100,100,0.15);
  }
  .coal-body::before {
    content: '';
    position: absolute;
    top: 14px; left: 12px;
    width: 10px; height: 12px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 22px 0 0 0 #fff;
  }
  .coal-body::after {
    content: '';
    position: absolute;
    top: 18px; left: 15px;
    width: 5px; height: 5px;
    background: #111;
    border-radius: 50%;
    box-shadow: 22px 0 0 0 #111;
  }
  /* 黑煤球头上的小红花 */
  .coal-flower {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 20px; height: 20px;
    z-index: 2;
  }
  .coal-flower::before {
    content: '🌸';
    font-size: 16px;
    position: absolute;
    top: -4px; left: -4px;
  }
  .coal-flower::after {
    content: '';
    position: absolute;
    top: 12px; left: 50%;
    transform: translateX(-50%);
    width: 2px; height: 8px;
    background: #4caf50;
    border-radius: 1px;
  }
  /* 黑煤球腮红 */
  .coal-blush-l, .coal-blush-r {
    position: absolute;
    width: 10px; height: 6px;
    background: rgba(255,100,100,0.35);
    border-radius: 50%;
    top: 30px;
  }
  .coal-blush-l { left: 4px; }
  .coal-blush-r { right: 4px; }
  @keyframes coalBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }
  .loading .coal-text {
    margin-top: 4px;
    font-size: 14px;
    color: rgba(255,150,150,0.7);
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 卡片通用 */
  .card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 16px;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  .card .card-title {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* 出门指数卡 */
  .index-card { text-align: center; }
  .index-row {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
  }
  .index-col {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border-radius: 16px;
    padding: 16px 8px;
  }
  .index-col .col-label {
    font-size: 12px;
    color: rgba(255,255,255,0.45);
    margin-bottom: 8px;
  }
  .index-score {
    font-size: 48px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 2px;
  }
  .index-label {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .index-desc {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
  }
  .index-bars {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 12px;
  }
  .index-bar-item {
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 10px 6px;
    text-align: center;
  }
  .index-bar-item .bar-icon { font-size: 22px; margin-bottom: 4px; }
  .index-bar-item .bar-label { font-size: 11px; color: rgba(255,255,255,0.45); margin-bottom: 6px; }
  .index-bar-item .bar-track {
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
    margin: 0 4px;
  }
  .index-bar-item .bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.8s ease;
  }
  .index-bar-item .bar-val { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 4px; }

  /* 今日+明日天气双卡 */
  .weather-today-tomorrow {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
  }
  .wt-card {
    flex: 1;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 18px;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  .wt-card .wt-date {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 10px;
  }
  .wt-card .wt-date .wt-tag {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 8px;
    font-size: 11px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .wt-card .wt-tag.today { background: rgba(168,237,234,0.2); color: #a8edea; }
  .wt-card .wt-tag.tomorrow { background: rgba(254,214,227,0.2); color: #fed6e3; }
  .wt-main {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .wt-icon { font-size: 40px; line-height: 1; }
  .wt-temp { flex: 1; }
  .wt-temp .temp-range {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -1px;
  }
  .wt-temp .temp-range .unit { font-size: 14px; font-weight: 400; }
  .wt-temp .weather-desc {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    margin-top: 1px;
  }
  .wt-temp .feels-like {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    margin-top: 1px;
  }
  .wt-details {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
  }
  .wt-detail-item {
    text-align: center;
    padding: 6px 2px;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
  }
  .wt-detail-item .dd-icon { font-size: 14px; }
  .wt-detail-item .dd-val { font-size: 12px; font-weight: 600; }
  .wt-detail-item .dd-label { font-size: 9px; color: rgba(255,255,255,0.4); }

  /* 未来15天折叠 */
  .forecast-collapse-btn {
    width: 100%;
    padding: 12px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.5);
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .forecast-collapse-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .forecast-collapse-btn .arrow {
    transition: transform 0.3s;
    display: inline-block;
  }
  .forecast-collapse-btn.expanded .arrow { transform: rotate(180deg); }

  .forecast-list {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.5s ease;
    margin-bottom: 0;
  }
  .forecast-list.show {
    max-height: 3000px;
    margin-bottom: 16px;
  }
  .forecast-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: rgba(255,255,255,0.06);
    border-radius: 12px;
    margin-bottom: 6px;
  }
  .forecast-item .fc-date {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    width: 60px;
    flex-shrink: 0;
  }
  .forecast-item .fc-icon { font-size: 22px; width: 28px; text-align: center; }
  .forecast-item .fc-desc { font-size: 13px; flex: 1; color: rgba(255,255,255,0.7); }
  .forecast-item .fc-temp { font-size: 14px; font-weight: 600; white-space: nowrap; }
  .forecast-item .fc-temp .fc-lo { color: rgba(255,255,255,0.45); }

  /* 出门提醒 */
  .tips-card .card-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tip-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    animation: fadeInUp 0.5s ease both;
  }
  .tip-item:last-child { border-bottom: none; }
  .tip-item:nth-child(2) { animation-delay: 0.05s; }
  .tip-item:nth-child(3) { animation-delay: 0.1s; }
  .tip-item:nth-child(4) { animation-delay: 0.15s; }
  .tip-item:nth-child(5) { animation-delay: 0.2s; }
  .tip-item:nth-child(6) { animation-delay: 0.25s; }
  .tip-item:nth-child(7) { animation-delay: 0.3s; }
  .tip-item:nth-child(8) { animation-delay: 0.35s; }
  .tip-item:nth-child(9) { animation-delay: 0.4s; }
  .tip-item:nth-child(10) { animation-delay: 0.45s; }
  .tip-item:nth-child(11) { animation-delay: 0.5s; }
  .tip-item:nth-child(12) { animation-delay: 0.55s; }
  .tip-item:nth-child(13) { animation-delay: 0.6s; }
  .tip-item:nth-child(14) { animation-delay: 0.65s; }
  .tip-item:nth-child(15) { animation-delay: 0.7s; }
  .tip-item:nth-child(16) { animation-delay: 0.75s; }
  .tip-item:nth-child(17) { animation-delay: 0.8s; }
  .tip-item:nth-child(18) { animation-delay: 0.85s; }
  .tip-item:nth-child(19) { animation-delay: 0.9s; }
  .tip-item:nth-child(20) { animation-delay: 0.95s; }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .tip-icon {
    font-size: 28px;
    flex-shrink: 0;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    background: rgba(255,255,255,0.06);
  }
  .tip-content { flex: 1; }
  .tip-content .tip-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 3px;
  }
  .tip-content .tip-desc {
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    line-height: 1.5;
  }
  .tip-item.important .tip-icon { background: rgba(255,78,80,0.2); }
  .tip-item.important .tip-title { color: #ff6b6b; }

  .section-title {
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    letter-spacing: 2px;
    padding: 8px 0 4px;
    margin-top: 4px;
    border-bottom: none !important;
    animation: none !important;
  }
  .section-title .section-line {
    display: inline-block;
    width: 24px;
    height: 2px;
    background: rgba(255,255,255,0.2);
    vertical-align: middle;
    margin-right: 8px;
    border-radius: 1px;
  }

  .footer {
    text-align: center;
    padding: 20px 0;
    font-size: 12px;
    color: rgba(255,255,255,0.25);
  }

  .error-card {
    background: rgba(255,78,80,0.1);
    border: 1px solid rgba(255,78,80,0.3);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    color: rgba(255,255,255,0.7);
    margin: 20px 0;
  }
  .error-card .err-icon { font-size: 40px; margin-bottom: 8px; }

  /* ── 应援弹幕 ── */
  .danmaku-bar {
    height: 38px;
    margin-bottom: 8px;
    overflow: hidden;
    border-radius: 19px;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,80,80,0.2);
    flex-shrink: 0;
  }
  .danmaku-track {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 48px;
    animation: danmakuRoll 32s linear infinite;
  }
  .danmaku-track span{font-size:13px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.7);font-weight:600;letter-spacing:.5px}
  .danmaku-track .dm-red{color:#ff6b6b}.danmaku-track .dm-gold{color:#ffd700}.danmaku-track .dm-pink{color:#ffb6c1}.danmaku-track .dm-cyan{color:#a8edea}
  @keyframes danmakuRoll{0%{transform:translateY(-50%) translateX(0)}100%{transform:translateY(-50%) translateX(-50%)}}

  /* ── 火星漂浮贴纸 ── */
  .mars-stickers{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;overflow:hidden}
  .msticker{position:absolute;font-size:26px;animation-duration:12s;animation-timing-function:ease-in-out;animation-iteration-count:infinite;filter:drop-shadow(0 2px 6px rgba(0,0,0,.4));opacity:.7}
  .msticker:nth-child(1){top:8%;left:3%;animation-name:float1}
  .msticker:nth-child(2){top:14%;right:4%;animation-name:float2;animation-delay:2s;font-size:20px}
  .msticker:nth-child(3){top:25%;left:8%;animation-name:float3;animation-delay:4s;font-size:22px}
  .msticker:nth-child(4){top:35%;right:6%;animation-name:float4;animation-delay:1s;font-size:28px}
  .msticker:nth-child(5){top:50%;left:5%;animation-name:float1;animation-delay:3s;font-size:18px}
  .msticker:nth-child(6){top:60%;right:3%;animation-name:float2;animation-delay:5s;font-size:24px}
  .msticker:nth-child(7){top:72%;left:7%;animation-name:float3;animation-delay:6s;font-size:20px}
  .msticker:nth-child(8){top:82%;right:5%;animation-name:float4;animation-delay:2s;font-size:22px}
  @keyframes float1{0%,100%{transform:translateY(0) rotate(0) scale(1)}15%{transform:translateY(-12px) rotate(8deg) scale(1.1)}85%{transform:translateY(8px) rotate(-5deg) scale(.95)}}
  @keyframes float2{0%,100%{transform:translateY(0) rotate(0) scale(1)}20%{transform:translateY(-10px) rotate(-6deg) scale(1.05)}80%{transform:translateY(12px) rotate(7deg) scale(.98)}}
  @keyframes float3{0%,100%{transform:translateX(0) translateY(0)}25%{transform:translateX(6px) translateY(-8px) rotate(5deg)}75%{transform:translateX(-4px) translateY(10px) rotate(-3deg)}}
  @keyframes float4{0%,100%{transform:translateY(0) scale(1);opacity:.7}50%{transform:translateY(-6px) scale(1.08);opacity:.9}}

  /* ── 音乐播放器 ── */
  .music-player{position:fixed;bottom:18px;right:18px;z-index:999;display:flex;align-items:center;gap:8px;background:rgba(15,5,10,.88);backdrop-filter:blur(16px);border:1px solid rgba(255,80,80,.4);border-radius:28px;padding:8px 12px 8px 10px;box-shadow:0 4px 20px rgba(0,0,0,.4);transition:all .3s;max-width:220px}
  .music-player:hover{border-color:rgba(255,80,80,.7);transform:scale(1.02)}
  .mp-icon{font-size:18px;animation:mpPulse 2s ease-in-out infinite;flex-shrink:0}
  .mp-icon.playing{animation:mpPulse 1s ease-in-out infinite}
  @keyframes mpPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.25)}}
  .mp-info{flex:1;min-width:0}
  .mp-title{font-size:11px;color:#fff;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mp-sub{font-size:10px;color:rgba(255,255,255,.4);margin-top:1px}

<script>
const WMO_CODES = {
  0:{desc:'晴',icon:'☀️'},1:{desc:'大部晴朗',icon:'🌤️'},2:{desc:'多云',icon:'⛅'},3:{desc:'阴天',icon:'☁️'},
  45:{desc:'雾',icon:'🌫️'},48:{desc:'冻雾',icon:'🌫️'},
  51:{desc:'小毛毛雨',icon:'🌦️'},53:{desc:'中毛毛雨',icon:'🌦️'},55:{desc:'大毛毛雨',icon:'🌧️'},
  56:{desc:'冻毛毛雨',icon:'🌧️'},57:{desc:'强冻毛毛雨',icon:'🌧️'},
  61:{desc:'小雨',icon:'🌧️'},63:{desc:'中雨',icon:'🌧️'},65:{desc:'大雨',icon:'🌧️'},
  66:{desc:'冻雨',icon:'🧊'},67:{desc:'强冻雨',icon:'🧊'},
  71:{desc:'小雪',icon:'🌨️'},73:{desc:'中雪',icon:'❄️'},75:{desc:'大雪',icon:'❄️'},77:{desc:'雪粒',icon:'🌨️'},
  80:{desc:'小阵雨',icon:'🌦️'},81:{desc:'中阵雨',icon:'🌧️'},82:{desc:'强阵雨',icon:'⛈️'},
  85:{desc:'小阵雪',icon:'🌨️'},86:{desc:'大阵雪',icon:'❄️'},
  95:{desc:'雷暴',icon:'⛈️'},96:{desc:'雷暴伴冰雹',icon:'⛈️'},99:{desc:'强雷暴伴冰雹',icon:'⛈️'},
};
function getWMO(code){return WMO_CODES[code]||{desc:'未知',icon:'❓'};}
function windLevel(s){if(s<6)return'微风';if(s<12)return'轻风';if(s<20)return'和风';if(s<29)return'劲风';if(s<39)return'强风';return'大风';}

function barColor(s){if(s>=70)return'#4caf50';if(s>=50)return'#ffc107';return'#ff5722';}

function calcOutIndex(data){
  let score=80;
  const{tempMin,tempMax,weatherCode,precipProb,windMax,uvMax,humidity}=data;
  const isRain=[51,53,55,56,57,61,63,65,66,67,80,81,82,95,96,99].includes(weatherCode);
  const isSnow=[71,73,75,77,85,86].includes(weatherCode);
  const isFog=[45,48].includes(weatherCode);
  const isThunder=[95,96,99].includes(weatherCode);
  if(isThunder)score-=30;else if(isRain)score-=precipProb*0.2;
  if(isSnow)score-=15;if(isFog)score-=10;
  if(tempMax>=38)score-=15;else if(tempMax>=35)score-=8;else if(tempMax>=30)score-=3;
  if(tempMin<=-5)score-=15;else if(tempMin<=0)score-=8;else if(tempMin<=5)score-=3;
  if(windMax>=50)score-=15;else if(windMax>=39)score-=8;else if(windMax>=25)score-=3;
  if(uvMax>9)score-=5;else if(uvMax>7)score-=2;
  if(humidity>=90)score-=5;else if(humidity<=20)score-=3;
  const diff=tempMax-tempMin;if(diff>=18)score-=5;else if(diff>=12)score-=2;
  score=Math.max(0,Math.min(100,Math.round(score)));
  let label,color,desc;
  if(score>=85){label='非常适宜';color='#4caf50';desc='天气很棒，放心出门！';}
  else if(score>=70){label='适宜出门';color='#8bc34a';desc='天气不错，正常出行。';}
  else if(score>=55){label='一般';color='#ffc107';desc='有小状况，注意提醒事项。';}
  else if(score>=40){label='不太适宜';color='#ff9800';desc='条件较差，做好防护。';}
  else{label='不建议出门';color='#f44336';desc='天气恶劣，非必要不出门！';}
  return{score,label,color,desc};
}

function calcSubIndex(data){
  const{tempMin,tempMax,weatherCode,precipProb,windMax,uvMax,humidity}=data;
  const isRain=[51,53,55,56,57,61,63,65,66,67,80,81,82,95,96,99].includes(weatherCode);
  const isSnow=[71,73,75,77,85,86].includes(weatherCode);
  let dress=80;
  if(tempMax>=35)dress=30;else if(tempMax>=30)dress=50;else if(tempMax>=22)dress=90;
  else if(tempMax>=15)dress=70;else if(tempMax>=5)dress=50;else dress=30;
  if(tempMax-tempMin>=15)dress-=15;
  let sport=80;
  if(isRain||isSnow)sport-=30;if(precipProb>50)sport-=15;
  if(tempMax>=35||tempMin<=-5)sport-=25;else if(tempMax>=30||tempMin<=0)sport-=10;
  if(windMax>=30)sport-=15;else if(windMax>=20)sport-=5;if(uvMax>8)sport-=10;
  let dry=80;
  if(isRain)dry=20;else if(isSnow)dry=25;
  if(precipProb>60)dry-=30;else if(precipProb>30)dry-=15;
  if(humidity>=80)dry-=20;else if(humidity>=65)dry-=10;
  if(weatherCode<=1)dry+=10;
  return{
    dress:{score:Math.max(0,Math.min(100,dress)),label:'穿衣'},
    sport:{score:Math.max(0,Math.min(100,sport)),label:'运动'},

function makeDayData(d,i){

    windMax:Math.round(d.daily.wind_speed_10m_max[i]),

    sunset:d.daily.sunset[i]?d.daily.sunset[i].split('T')[1]:null,
  };
}

function fmtDate(offset){
  const d=new Date();d.setDate(d.getDate()+offset);
  return d.toLocaleDateString('zh-CN',{month:'numeric',day:'numeric',weekday:'short'});
}
function fmtDateLong(offset){
  const d=new Date();d.setDate(d.getDate()+offset);
  return d.toLocaleDateString('zh-CN',{month:'long',day:'numeric',weekday:'long'});
}

function parseHourlyData(data){
  if(!data||!data.hourly) return [];
  const now=new Date();
  const hours=data.hourly.time;
  const temps=data.hourly.temperature_2m;
  const codes=data.hourly.weathercode;
  const pops=data.hourly.precipitation_probability;
  const hums=data.hourly.relative_humidity_2m;
  const winds=data.hourly.wind_speed_10m;
  const result=[];
  for(let i=0;i<hours.length;i++){
    const t=new Date(hours[i]);
    if(t<now){continue;}
    result.push({
      time:t.getHours()===0?'0点':t.getHours()+':00',
      hour:t.getHours(),
      temp:Math.round(temps[i]),
      code:codes[i],
      pop:pops?pops[i]:null,
      hum:hums?hums[i]:null,
      wind:winds?Math.round(winds[i]):null
    });
    if(result.length>=24) break;
  }
  return result;
}

async function fetchWeather(lat,lon,cityName){
  document.getElementById('content').innerHTML='<div class="loading"><div class="coal-ball"><div class="coal-flower"></div><div class="coal-body"><div class="coal-blush-l"></div><div class="coal-blush-r"></div></div></div><div class="coal-text">黑煤球正在获取天气...</div></div>';

    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode,wind_speed_10m_max,uv_index_max,sunrise,sunset,relative_humidity_2m_max,apparent_temperature_max,apparent_temperature_min,precipitation_sum&timezone=auto&forecast_days=16&hourly=temperature_2m,weathercode,precipitation_probability,relative_humidity_2m,wind_speed_10m`;
    const res=await fetch(url);
    if(!res.ok)throw new Error('天气API请求失败');
    const d=await res.json();

    const todayData=makeDayData(d,0);
    const tomorrowData=makeDayData(d,1);

    // 未来15天（从后天开始）
    const forecastData=[];
    for(let i=2;i<d.daily.temperature_2m_max.length;i++){
      const dd=new Date(d.daily.time[i]);
      forecastData.push({
        dateShort:dd.toLocaleDateString('zh-CN',{month:'numeric',day:'numeric',weekday:'short'}),
        tempMax:Math.round(d.daily.temperature_2m_max[i]),
        tempMin:Math.round(d.daily.temperature_2m_min[i]),
        weatherCode:d.daily.weathercode[i],
      });
    }

    const hourlyData=parseHourlyData(d);

    renderAll(todayData,tomorrowData,forecastData,cityName,hourlyData);
  }catch(e){
    console.error(e);
    renderError('获取天气数据失败，请检查网络后重试');
  }
}

// 多城市管理
let cityList = [];
let currentCityIndex = -1;

function loadCities(){
  try { cityList = JSON.parse(localStorage.getItem('weatherCities')||'[]'); } catch(e){ cityList=[]; }
  // 默认城市
  if(!cityList.length){
    cityList=[{name:'应城',lat:30.93,lon:113.57}];
    saveCities();
  }
}
function saveCities(){ localStorage.setItem('weatherCities',JSON.stringify(cityList)); }

function renderCityTags(){
  const container=document.getElementById('cityTags');
  if(!container) return;
  container.innerHTML=cityList.map((c,i)=>
    `<div class="city-tag${i===currentCityIndex?' active':''}" onclick="switchCity(${i})">
      <span>${c.name}</span>${cityList.length>1?`<span class="tag-close" onclick="event.stopPropagation();removeCity(${i})">✕</span>`:''}`
    +'</div>'
  ).join('');
}

function switchCity(i){
  currentCityIndex=i;
  const c=cityList[i];
  renderCityTags();
  fetchWeather(c.lat,c.lon,c.name);
}

function removeCity(i){
  if(cityList.length<=1) return;
  cityList.splice(i,1);
  saveCities();
  if(currentCityIndex>=cityList.length) currentCityIndex=cityList.length-1;
  if(currentCityIndex<0) currentCityIndex=0;
  renderCityTags();
  const c=cityList[currentCityIndex];
  fetchWeather(c.lat,c.lon,c.name);
}

async function addCity(){
  const city=document.getElementById('cityInput').value.trim();
  if(!city)return;
  document.getElementById('content').innerHTML='<div class="loading"><div class="coal-ball"><div class="coal-flower"></div><div class="coal-body"><div class="coal-blush-l"></div><div class="coal-blush-r"></div></div></div><div class="coal-text">黑煤球正在搜索城市...</div></div>';
  try{
    const geoUrl=`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=zh`;
    const geoRes=await fetch(geoUrl);
    const geoData=await geoRes.json();
    if(!geoData.results||geoData.results.length===0){renderError(`未找到城市「${city}」，请检查名称后重试`);return;}
    const r=geoData.results[0];
    const name=r.name+(r.admin1?` · ${r.admin1}`:'');
    // 检查是否已存在
    const dup=cityList.find(c=>c.lat===r.latitude&&c.lon===r.longitude);
    if(dup){
      currentCityIndex=cityList.indexOf(dup);
      renderCityTags();
      fetchWeather(dup.lat,dup.lon,dup.name);
      document.getElementById('cityInput').value='';
      return;
    }
    cityList.push({name,lat:r.latitude,lon:r.longitude});
    saveCities();
    currentCityIndex=cityList.length-1;
    renderCityTags();
    document.getElementById('cityInput').value='';
    fetchWeather(r.latitude,r.longitude,name);
  }catch(e){renderError('城市搜索失败，请检查网络后重试');}
}

function locateMe(){
  if(!navigator.geolocation){renderError('您的浏览器不支持定位功能');return;}
  document.getElementById('content').innerHTML='<div class="loading"><div class="coal-ball"><div class="coal-flower"></div><div class="coal-body"><div class="coal-blush-l"></div><div class="coal-blush-r"></div></div></div><div class="coal-text">黑煤球正在定位...</div></div>';
  navigator.geolocation.getCurrentPosition(
    async(pos)=>{
      const name='📍 当前位置';
      // 检查是否已有定位城市
      let loc=cityList.find(c=>c.isLoc);
      if(loc){
        loc.lat=pos.coords.latitude;loc.lon=pos.coords.longitude;
        currentCityIndex=cityList.indexOf(loc);
      }else{
        cityList.push({name,lat:pos.coords.latitude,lon:pos.coords.longitude,isLoc:true});
        currentCityIndex=cityList.length-1;
      }
      saveCities();
      renderCityTags();
      fetchWeather(pos.coords.latitude,pos.coords.longitude,name);
    },
    ()=>{renderError('定位失败，请手动输入城市名查询');},
    {timeout:8000}
  );
}

loadCities();
currentCityIndex=0;
renderCityTags();

  setInterval(()=>{
    slides[current].classList.remove('active');
    current = (current + 1) % slides.length;
    slides[current].classList.add('active');
